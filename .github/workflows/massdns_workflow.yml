name: Windows Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Set up Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          packages: cmake gcc-g++

      - name: Check Cygwin installation
        run: |
          ls.exe -Al
          pwd.exe
      - name: Clone repository
        run: git clone https://github.com/blechschmidt/massdns.git

      - name: Get Cygwin bash path
        run: echo "CYGWIN_BASH=$(cygpath -u /usr/bin/bash.exe)" >> $GITHUB_ENV

      - name: Build massdns
        run: |
        	chmod -R a+rw massdns
        	$CYGWIN_BASH -c "cd massdns && make nolinux"
        	
      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: massdns
          path: massdns/bin/massdns.exe
