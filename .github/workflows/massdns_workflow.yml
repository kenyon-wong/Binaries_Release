name: Windows Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Set up Cygwin
        uses: egor-tensin/setup-cygwin@v4
        with:
          packages: cmake gcc-g++

      # Cygwin executables are added to PATH, so you can call them directly:
      - run: |
          ls.exe -Al
          pwd.exe

      # Alternatively, you can set Cygwin's bash as the shell to use:
      - run: |
          # This is a real bash script!
          basic() {
              ls -Al
              pwd
          }
          basic
        shell: C:\tools\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'

      - name: Clone repository
        run: git clone https://github.com/blechschmidt/massdns.git

      - name: Build
        run: |
          cd massdns
          make

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: massdns
          path: massdns/bin/massdns.exe

      # Add additional steps as needed for testing, deployment, etc.
