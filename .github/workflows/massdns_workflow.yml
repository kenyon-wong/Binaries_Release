name: Windows Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runsname: Build and Upload Massdns for Windows x64

on:
  workflow_dispatch:  # 手动触发工作流程

jobs:
  build_and_upload:
    runs-on: windows-latest  # 使用 Windows 环境

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Git and Chocolatey
      run: |
        choco install git -y
        git config --global core.autocrlf input
        choco install chocolatey -y
        refreshenv

    - name: Install Cygwin
      run: |
        choco install cyg-get -y
        cyg-get install make wget unzip -q

    - name: Build Massdns
      run: |
        git clone https://github.com/blechschmidt/massdns.git
        cd massdns
        chmod +x massdns/scripts/subbrute.py  # 确保脚本可执行权限
        make nolinux

    - name: Upload binaries
      uses: actions/upload-artifact@v2
      with:
        name: massdns-binaries
        path: massdns/bin/massdns.exe